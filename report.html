<div class="page-container">

<h2>Report an Issue</h2>

<form id="reportForm">

<label>Description</label>
<textarea id="issueText" placeholder="Describe the issue..." required></textarea>

<label>Upload Image</label>
<input type="file" id="imageInput" accept="image/*">

<label>Location</label>
<input type="text" id="location" placeholder="Enter location" required>

<label>Category</label>
<select id="category">

<option value="Road">Road</option>
<option value="Water">Water</option>
<option value="Electricity">Electricity</option>
<option value="Garbage">Garbage</option>
<option value="Women Safety">Women Safety</option>
<option value="Child Safety">Child Safety</option>

</select>

<button type="submit" class="submit-btn">Submit Issue</button>

</form>

</div>


<script>

</script>

    },

</script>
